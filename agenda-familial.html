<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7B7AC9">
<title>Agenda familial</title>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#FAF9F5;
    --surface:#FFFFFF;
    --surface-2:#F2F0E8;
    --border:#E5E2D8;
    --border-strong:#D6D2C4;
    --text:#21201B;
    --text-secondary:#65635A;
    --text-tertiary:#928F82;
    --accent:#7B7AC9;
    --accent-light:#EDECFB;
    --accent-text:#3C3489;
    --danger:#A32D2D;
    --danger-bg:#FCEBEB;
    --danger-border:#F09595;
    --nina-dot:#9C9BE0; --nina-bg:#EFEEFB; --nina-border:#C2C0EF; --nina-text:#3C3489;
    --ilhan-dot:#E8C24D; --ilhan-bg:#FBF3DE; --ilhan-border:#EFD988; --ilhan-text:#6B4E0A;
    --notes-dot:#9BC9A8; --notes-bg:#E9F5EC; --notes-border:#BBE0C7; --notes-text:#1F5A35;
    --radius-sm:6px;
    --radius-md:10px;
    --radius-lg:16px;
    --shadow-modal:0 12px 32px rgba(30,28,20,0.18);
    --shadow-postit:0 3px 8px rgba(40,35,20,0.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  button, input, textarea, select{ font-family:inherit; }
  button{cursor:pointer; -webkit-appearance:none; appearance:none;}
  button:active{ transform:scale(0.97); }

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--accent);
    color:#fff;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 14px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .topbar-title{display:flex; align-items:center; gap:10px;}
  .topbar-title h1{font-size:17px; font-weight:600; margin:0;}
  .logo-dot{
    width:30px;height:30px;border-radius:9px;
    background:rgba(255,255,255,0.18);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .topbar-actions{display:flex; gap:8px;}
  .icon-btn{
    width:34px;height:34px;border-radius:10px;
    border:none; background:rgba(255,255,255,0.16); color:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  .icon-btn:hover{ background:rgba(255,255,255,0.26); }

  .sync-badge{ display:flex; align-items:center; gap:5px; font-size:10.5px; color:rgba(255,255,255,0.85); margin-top:2px; }
  .sync-dot{ width:6px;height:6px;border-radius:50%; background:#7BE0B0; flex-shrink:0; }
  .sync-dot.offline{ background:#F0B05A; }

  /* ---------- Main layout ---------- */
  main{ padding:16px 14px 28px; }

  .kids-row{
    display:grid; grid-template-columns:1fr 1fr; gap:11px;
    margin-bottom:14px;
  }

  .kid-card{
    border-radius:18px;
    border:2.5px solid;
    background:var(--surface);
    overflow:hidden;
    display:flex; flex-direction:column;
  }
  .kid-card-header{
    display:flex; align-items:center; justify-content:space-between;
    gap:6px; padding:10px 12px;
  }
  .kid-card-name{
    display:flex; align-items:center; gap:8px;
    font-size:15px; font-weight:800;
  }
  .kid-card-avatar{
    width:28px;height:28px;border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:12.5px; font-weight:800; color:#fff;
  }
  .kid-card-edit{
    width:26px;height:26px;border-radius:8px;border:none;background:transparent;
    display:flex;align-items:center;justify-content:center; flex-shrink:0; opacity:0.55;
  }

  .kid-postit{
    margin:0 9px 9px;
    border-radius:13px;
    padding:11px 11px 12px;
    min-height:120px;
    display:flex; flex-direction:column; gap:7px;
    box-shadow:var(--shadow-postit);
  }
  .kid-postit-empty{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:6px; padding:10px 4px; text-align:center;
  }
  .kid-postit-empty span{ font-size:12px; font-weight:600; opacity:0.65; }
  .kid-postit-add-hint{
    display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; opacity:0.8;
  }

  .rdv-item{
    background:rgba(255,255,255,0.6);
    border-radius:10px;
    padding:8px 9px;
  }
  .rdv-item-title{ font-size:13px; font-weight:700; margin:0; line-height:1.25; }
  .rdv-item-meta{ display:flex; gap:8px; margin-top:3px; flex-wrap:wrap; }
  .rdv-item-meta span{ display:flex; align-items:center; gap:3px; font-size:10.5px; font-weight:600; opacity:0.75; }
  .rdv-item-del{
    margin-top:5px; display:inline-flex; align-items:center; gap:3px;
    font-size:10px; font-weight:700; opacity:0.55; background:none; border:none; padding:0;
  }

  .kid-postit-footer{
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:8px 6px 2px; font-size:11.5px; font-weight:700; opacity:0.7;
    border-top:1px dashed rgba(0,0,0,0.12); margin-top:2px;
  }

  /* ---------- Bottom row: mini calendar + notes ---------- */
  .bottom-row{
    display:grid; grid-template-columns:1fr 1fr; gap:11px;
  }

  .mini-cal-card{
    border-radius:16px; border:1.5px solid var(--border); background:var(--surface);
    padding:11px 10px 12px;
  }
  .mini-cal-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
  .mini-cal-title{ font-size:12.5px; font-weight:800; }
  .mini-cal-nav{ display:flex; gap:3px; }
  .mini-nav-btn{
    width:22px;height:22px;border-radius:6px;border:none;background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;color:var(--text-secondary);
  }
  .mini-weekday-row{ display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:2px; }
  .mini-weekday-cell{ text-align:center; font-size:8px; font-weight:700; color:var(--text-tertiary); }
  .mini-cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
  .mini-day-cell{
    aspect-ratio:1/1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:6px; position:relative;
  }
  .mini-day-num{ font-size:9.5px; font-weight:600; color:var(--text-secondary); }
  .mini-day-num.today{ color:#fff; background:var(--accent); border-radius:50%; width:15px;height:15px; display:flex; align-items:center; justify-content:center; font-size:8.5px; }
  .mini-day-cell.muted .mini-day-num{ opacity:0.28; }
  .mini-day-dots{ display:flex; gap:1.5px; position:absolute; bottom:1px; }
  .mini-day-dot{ width:3.5px;height:3.5px;border-radius:50%; }

  .notes-card{
    border-radius:16px; border:2.5px solid var(--notes-border);
    background:var(--notes-bg); color:var(--notes-text);
    padding:11px 11px 10px;
    display:flex; flex-direction:column;
  }
  .notes-card-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
  .notes-card-title{ font-size:13px; font-weight:800; display:flex; align-items:center; gap:6px; }
  .notes-add-btn{
    width:24px;height:24px;border-radius:7px;border:none;background:rgba(255,255,255,0.6);
    display:flex;align-items:center;justify-content:center;color:var(--notes-text); flex-shrink:0;
  }
  .notes-list{ display:flex; flex-direction:column; gap:6px; max-height:160px; overflow-y:auto; }
  .note-item{ background:rgba(255,255,255,0.55); border-radius:9px; padding:7px 8px; }
  .note-item-top{ display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .note-item-type{ font-size:11px; font-weight:800; }
  .note-item-del{ background:none; border:none; padding:0; opacity:0.5; display:flex; }
  .note-item-meta{ font-size:10px; font-weight:600; opacity:0.8; margin-top:2px; }
  .note-item-comment{ font-size:10.5px; margin-top:3px; opacity:0.85; line-height:1.3; }
  .notes-empty{ font-size:11.5px; opacity:0.65; text-align:center; padding:14px 4px; flex:1; display:flex; align-items:center; justify-content:center; }

  /* ---------- Overlay / Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(20,18,12,0.5); z-index:100;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .overlay.center{ align-items:center; padding:16px; }
  .modal{
    width:100%; max-width:480px; max-height:88vh;
    background:var(--surface);
    border-radius:20px 20px 0 0;
    box-shadow:var(--shadow-modal);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .overlay.center .modal{ border-radius:18px; max-height:90vh; }
  .modal-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .modal-title{ font-size:16px; font-weight:700; margin:0; display:flex; align-items:center; gap:8px; }
  .close-btn{
    width:30px;height:30px;border-radius:8px;border:none;background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;color:var(--text-secondary);
  }
  .modal-body{ padding:18px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }
  .modal-footer{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 18px; border-top:1px solid var(--border); flex-shrink:0;
    padding-bottom:calc(env(safe-area-inset-bottom) + 14px);
  }
  .footer-actions{ display:flex; gap:8px; flex:1; justify-content:flex-end; }

  /* ---------- Form ---------- */
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field-label{ font-size:12.5px; font-weight:700; color:var(--text-secondary); }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  input[type=text], input[type=date], input[type=time], input[type=password], textarea{
    height:44px; padding:0 13px; font-size:15px; border-radius:11px;
    border:1.5px solid var(--border-strong); background:var(--surface); color:var(--text); width:100%;
  }
  textarea{ height:auto; padding:11px 13px; resize:vertical; min-height:64px; }
  input:focus, textarea:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(123,122,201,0.18); }

  .primary-btn{
    display:flex; align-items:center; gap:6px; justify-content:center;
    padding:12px 16px; font-size:14px; font-weight:700; border:none; border-radius:12px;
    background:var(--accent); color:#fff;
  }
  .primary-btn:disabled{ opacity:0.4; }
  .secondary-btn{
    padding:12px 16px; font-size:14px; font-weight:700; border-radius:12px;
    border:1.5px solid var(--border-strong); background:var(--surface); color:var(--text);
  }
  .danger-btn{
    display:flex; align-items:center; gap:6px; padding:10px 13px; font-size:13px; font-weight:700;
    border-radius:10px; border:1.5px solid var(--danger-border); background:transparent; color:var(--danger);
  }
  .danger-btn-filled{
    padding:12px 16px; font-size:14px; font-weight:700; border-radius:12px;
    border:none; background:var(--danger); color:#fff;
  }

  .opt-grid{ display:flex; flex-wrap:wrap; gap:7px; }
  .opt-btn{
    display:flex; align-items:center; gap:6px; padding:8px 12px; font-size:12.5px; font-weight:700;
    border-radius:10px; border:1.5px solid var(--border); background:var(--surface); color:var(--text-secondary);
  }

  .kid-row{
    display:flex; align-items:center; justify-content:space-between; padding:11px 13px;
    border-radius:12px; border:1.5px solid var(--border); margin-bottom:8px;
  }
  .kid-row-left{ display:flex; align-items:center; gap:10px; font-size:14.5px; font-weight:700; }
  .icon-btn-sm{
    width:32px;height:32px;border-radius:9px;border:1.5px solid var(--border); background:transparent;
    display:flex;align-items:center;justify-content:center;color:var(--danger);
  }
  .color-pick-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .color-pick-dot{ width:30px;height:30px;border-radius:50%; border:2px solid transparent; flex-shrink:0; }
  .color-pick-dot.active{ border-color:var(--text); }
  .hint-text{ font-size:12.5px; color:var(--text-tertiary); }

  svg{ display:block; }

  /* ---------- Lock / login screen ---------- */
  #lock-screen{
    position:fixed; inset:0; z-index:200; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; text-align:center;
  }
  #lock-screen .lock-logo{
    width:58px;height:58px;border-radius:17px; background:var(--accent);
    display:flex; align-items:center; justify-content:center; margin-bottom:18px;
  }
  #lock-screen h1{ font-size:19px; font-weight:700; margin:0 0 4px; }
  #lock-screen p{ font-size:13.5px; color:var(--text-secondary); margin:0 0 22px; max-width:280px; }
  #lock-screen input{ width:100%; max-width:260px; text-align:center; letter-spacing:0.15em; font-size:18px; font-weight:600; }
  #lock-screen .primary-btn{ width:100%; max-width:260px; margin-top:14px; justify-content:center; }
  #lock-error{ color:var(--danger); font-size:12.5px; margin-top:10px; min-height:16px; }
  #lock-screen .sync-status{ font-size:11.5px; color:var(--text-tertiary); margin-top:18px; }
  .app-hidden{ display:none !important; }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-logo">
    <svg width="27" height="27" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <h1>Agenda familial</h1>
  <p>Entre le code d'accès partagé pour voir et modifier l'agenda de la famille.</p>
  <input type="password" inputmode="numeric" id="lock-code-input" placeholder="Code d'accès" maxlength="20">
  <button class="primary-btn" id="lock-submit">Accéder à l'agenda</button>
  <p id="lock-error"></p>
  <p class="sync-status" id="lock-sync-status">Connexion au serveur...</p>
</div>

<div id="app-root" class="app-hidden">

<div class="topbar">
  <div class="topbar-title">
    <div class="logo-dot">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>
    <div>
      <h1>Agenda familial</h1>
      <p class="sync-badge"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Synchronisé</span></p>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" id="btn-members" aria-label="Gérer les enfants">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </button>
  </div>
</div>

<main>
  <div class="kids-row" id="kids-row"></div>
  <div class="bottom-row">
    <div class="mini-cal-card" id="mini-cal-card"></div>
    <div class="notes-card" id="notes-card"></div>
  </div>
</main>

<div id="modal-root"></div>

</div><!-- /#app-root -->

<script>
(function(){
  "use strict";

  // ---------- Config ----------
  var KID_COLORS = [
    { key:"blueviolet", dot:"var(--nina-dot)",  bg:"var(--nina-bg)",  border:"var(--nina-border)",  text:"var(--nina-text)",  hex:"#9C9BE0" },
    { key:"yellow",     dot:"var(--ilhan-dot)", bg:"var(--ilhan-bg)", border:"var(--ilhan-border)", text:"var(--ilhan-text)", hex:"#E8C24D" },
    { key:"teal",       dot:"#5DCAA5", bg:"#E1F5EE", border:"#9DDFC6", text:"#085041", hex:"#5DCAA5" },
    { key:"corail",     dot:"#F0997B", bg:"#FAECE7", border:"#F3B69E", text:"#712B13", hex:"#F0997B" },
    { key:"rose",       dot:"#ED93B1", bg:"#FBEAF0", border:"#F2B3C7", text:"#72243E", hex:"#ED93B1" },
    { key:"bleu",       dot:"#85B7EB", bg:"#E6F1FB", border:"#AED0F2", text:"#0C447C", hex:"#85B7EB" }
  ];

  var EVENT_TYPES = [
    { key:"medical", label:"Médical" },
    { key:"sport", label:"Sport" },
    { key:"ecole", label:"École" },
    { key:"sortie", label:"Sortie" },
    { key:"famille", label:"Famille" },
    { key:"autre", label:"Autre" }
  ];

  var DEFAULT_KIDS = [
    { id:"k1", name:"Nina", color:"blueviolet" },
    { id:"k2", name:"Ilhan", color:"yellow" }
  ];

  // ---------- Firebase config ----------
  var FIREBASE_CONFIG = {
    apiKey: "AIzaSyB8fcfs1yvXP0xY4WIT8TN_K2T3nmAjJC8",
    authDomain: "agenda-familial-34a85.firebaseapp.com",
    projectId: "agenda-familial-34a85",
    storageBucket: "agenda-familial-34a85.firebasestorage.app",
    messagingSenderId: "823303669649",
    appId: "1:823303669649:web:5b0c186e599a29f3b2bc30"
  };

  var LOCAL_CODE_KEY = "family-rdv-access-code-v1";
  var WEEKDAYS = ["L","M","M","J","V","S","D"];
  var MONTHS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  var DAYS_LONG = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];

  // ---------- State ----------
  var state = { events:[], members: DEFAULT_KIDS.slice(), notes:[] };
  var miniCalCursor = (function(){ var d=new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); })();
  var db = null;
  var docRef = null;
  var applyingRemoteUpdate = false;
  var saveDebounceTimer = null;

  // ---------- Helpers ----------
  function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
  function pad(n){ return String(n).padStart(2,"0"); }
  function toISO(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function fromISO(s){ var p=s.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
  function getKidColor(key){ for(var i=0;i<KID_COLORS.length;i++){ if(KID_COLORS[i].key===key) return KID_COLORS[i]; } return KID_COLORS[0]; }
  function getEventType(key){ for(var i=0;i<EVENT_TYPES.length;i++){ if(EVENT_TYPES[i].key===key) return EVENT_TYPES[i]; } return EVENT_TYPES[EVENT_TYPES.length-1]; }
  function formatDateShort(iso){ var d=fromISO(iso); return d.getDate()+" "+MONTHS[d.getMonth()].slice(0,3); }
  function esc(s){ var div=document.createElement("div"); div.textContent = s==null? "":s; return div.innerHTML; }
  function todayISO(){ return toISO(new Date()); }

  function codeToDocId(code){
    var normalized = code.trim().toLowerCase();
    var hash = 0;
    for(var i=0;i<normalized.length;i++){
      hash = ((hash << 5) - hash) + normalized.charCodeAt(i);
      hash |= 0;
    }
    return "family_" + Math.abs(hash).toString(36);
  }

  function setSyncStatus(text, offline){
    var dot = document.getElementById("sync-dot");
    var label = document.getElementById("sync-text");
    if(dot) dot.classList.toggle("offline", !!offline);
    if(label) label.textContent = text;
  }

  // ---------- Firebase init & sync ----------
  function initFirebaseAndConnect(code){
    try{
      if(!firebase.apps || !firebase.apps.length){
        firebase.initializeApp(FIREBASE_CONFIG);
      }
      db = firebase.firestore();
    }catch(e){
      showLockError("Impossible de se connecter au serveur. Vérifie ta connexion internet.");
      return;
    }

    docRef = db.collection("agendas").doc(codeToDocId(code));

    docRef.get().then(function(snap){
      if(!snap.exists){
        return docRef.set({ events:[], members: DEFAULT_KIDS.slice(), notes:[], updatedAt: Date.now() });
      }
    }).then(function(){
      localStorage.setItem(LOCAL_CODE_KEY, code);
      document.getElementById("lock-screen").classList.add("app-hidden");
      document.getElementById("app-root").classList.remove("app-hidden");
      subscribeToChanges();
    }).catch(function(err){
      showLockError("Connexion impossible. Vérifie ta connexion internet et réessaie.");
    });
  }

  function subscribeToChanges(){
    docRef.onSnapshot(function(snap){
      if(!snap.exists) return;
      var data = snap.data();
      applyingRemoteUpdate = true;
      state.events = Array.isArray(data.events) ? data.events : [];
      state.members = Array.isArray(data.members) && data.members.length ? data.members : DEFAULT_KIDS.slice();
      state.notes = Array.isArray(data.notes) ? data.notes : [];
      applyingRemoteUpdate = false;
      setSyncStatus("Synchronisé");
      renderAll();
    }, function(err){
      setSyncStatus("Hors ligne", true);
    });
  }

  function saveState(){
    if(applyingRemoteUpdate) return;
    if(!docRef){ return; }
    setSyncStatus("Synchronisation...", true);
    clearTimeout(saveDebounceTimer);
    saveDebounceTimer = setTimeout(function(){
      docRef.set({ events: state.events, members: state.members, notes: state.notes, updatedAt: Date.now() })
        .then(function(){ setSyncStatus("Synchronisé"); })
        .catch(function(){ setSyncStatus("Erreur de sync", true); });
    }, 250);
  }

  // ---------- Mini calendar ----------
  function renderMiniCalendar(){
    var card = document.getElementById("mini-cal-card");
    var year = miniCalCursor.getFullYear(), month = miniCalCursor.getMonth();
    var firstOfMonth = new Date(year, month, 1);
    var startOffset = (firstOfMonth.getDay()+6)%7;
    var daysInMonth = new Date(year, month+1, 0).getDate();
    var daysInPrevMonth = new Date(year, month, 0).getDate();

    var cells = [];
    for(var i=0;i<startOffset;i++){
      var dayNum = daysInPrevMonth-startOffset+i+1;
      cells.push({ date:new Date(year, month-1, dayNum), inMonth:false });
    }
    for(var d=1; d<=daysInMonth; d++){ cells.push({ date:new Date(year,month,d), inMonth:true }); }
    while(cells.length%7!==0 || cells.length<42){
      var last = cells[cells.length-1].date;
      var next = new Date(last); next.setDate(next.getDate()+1);
      cells.push({ date:next, inMonth:false });
      if(cells.length>=42) break;
    }

    var byDate = {};
    state.events.forEach(function(e){
      if(!byDate[e.date]) byDate[e.date] = [];
      byDate[e.date].push(e);
    });

    var today = todayISO();

    var html = '<div class="mini-cal-header"><span class="mini-cal-title">'+MONTHS[month]+' '+year+'</span>';
    html += '<div class="mini-cal-nav"><button class="mini-nav-btn" id="mini-prev"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>';
    html += '<button class="mini-nav-btn" id="mini-next"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button></div></div>';

    html += '<div class="mini-weekday-row">';
    WEEKDAYS.forEach(function(w){ html += '<div class="mini-weekday-cell">'+w+'</div>'; });
    html += '</div>';

    html += '<div class="mini-cal-grid">';
    cells.forEach(function(cell){
      var iso = toISO(cell.date);
      var dayEvents = byDate[iso] || [];
      var isToday = iso===today;
      html += '<div class="mini-day-cell'+(cell.inMonth?"":" muted")+'">';
      html += '<span class="mini-day-num'+(isToday?" today":"")+'">'+cell.date.getDate()+'</span>';
      if(dayEvents.length>0 && cell.inMonth){
        html += '<div class="mini-day-dots">';
        var seen = {};
        dayEvents.forEach(function(ev){
          (ev.memberIds.length ? ev.memberIds : ["_none"]).forEach(function(mid){
            if(seen[mid]) return;
            seen[mid] = true;
            var member = state.members.find(function(m){ return m.id===mid; });
            var color = member ? getKidColor(member.color).hex : "#C7C4B8";
            html += '<span class="mini-day-dot" style="background:'+color+'"></span>';
          });
        });
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';

    card.innerHTML = html;

    document.getElementById("mini-prev").addEventListener("click", function(){ miniCalCursor = new Date(year, month-1, 1); renderMiniCalendar(); });
    document.getElementById("mini-next").addEventListener("click", function(){ miniCalCursor = new Date(year, month+1, 1); renderMiniCalendar(); });
  }

    if(sorted.length===0){
      html += '<div class="notes-empty">Rien de noté pour l\'instant.</div>';
    } else {
      html += '<div class="notes-list">';
      sorted.forEach(function(n){

        html += '<div class="note-item" data-edit-note="'+n.id+'">';
        html += '<div class="note-item-top"><span class="note-item-type">'+esc(t.label)+'</span>';

        var metaParts = [];

        if(n.comment) html += '<div class="note-item-comment">'+esc(n.comment)+'</div>';
        html += '</div>';
      });

    }

    card.innerHTML = html;

    document.getElementById("notes-add-btn").addEventListener("click", function(){ openNoteModal(null); });
    card.querySelectorAll("[data-edit-note]").forEach(function(el){

        var id = el.getAttribute("data-edit-note");
        var n = state.notes.find(function(x){ return x.id===id; });
        if(n) openNoteModal(n);
      });
    });
    card.querySelectorAll("[data-del-note]").forEach(function(btn){
      btn.addEventListener("click", function(e){
        e.stopPropagation();
        var id = btn.getAttribute("data-del-note");
        state.notes = state.notes.filter(function(n){ return n.id!==id; });
        saveState();
        renderNotes();
      });
    });
  }

  // ---------- Confirm dialog ----------
  function openConfirmDialog(message, onConfirm){
    var root = document.getElementById("modal-root");
    var html = '<div class="overlay center" id="confirm-overlay"><div class="modal" style="max-width:340px;border-radius:18px;">';
    html += '<div style="padding:22px 18px 6px;"><p style="font-size:15px;margin:0;">'+esc(message)+'</p></div>';
    html += '<div class="modal-footer"><span></span><div class="footer-actions"><button class="secondary-btn" id="confirm-cancel">Annuler</button><button class="danger-btn-filled" id="confirm-ok">Supprimer</button></div></div>';
    html += '</div></div>';
    root.insertAdjacentHTML("beforeend", html);

    document.getElementById("confirm-cancel").addEventListener("click", function(){
      document.getElementById("confirm-overlay").remove();
    });
    document.getElementById("confirm-overlay").addEventListener("click", function(e){
      if(e.target.id==="confirm-overlay") document.getElementById("confirm-overlay").remove();
    });
    document.getElementById("confirm-ok").addEventListener("click", function(){
      document.getElementById("confirm-overlay").remove();
      onConfirm();
    });
  }

  // ---------- Kids (members) management modal ----------
  function openMembersModal(){ renderMembersModal(); }

  function renderMembersModal(){
    var root = document.getElementById("modal-root");
    var html = '<div class="overlay" id="mem-overlay"><div class="modal" style="max-width:420px;">';
    html += '<div class="modal-header"><h2 class="modal-title">Enfants</h2>';
    html += '<button class="close-btn" id="mem-close" aria-label="Fermer"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
    html += '<div class="modal-body">';

    if(state.members.length===0){
      html += '<p class="hint-text">Aucun enfant pour l\'instant.</p>';
    } else {
      state.members.forEach(function(m){
        var c = getKidColor(m.color);
        html += '<div class="kid-row"><div class="kid-row-left"><span class="kid-card-avatar" style="width:26px;height:26px;font-size:11px;background:'+c.dot+';color:'+c.text+'">'+esc(m.name.charAt(0).toUpperCase())+'</span><span>'+esc(m.name)+'</span></div>';
        html += '<button class="icon-btn-sm" data-remove="'+m.id+'" aria-label="Supprimer '+esc(m.name)+'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>';
      });
    }

    html += '<div class="field" style="margin-top:8px;"><label class="field-label">Ajouter un enfant</label>';
    html += '<div style="display:flex;gap:8px;"><input type="text" id="new-kid-name" placeholder="Prénom" style="flex:1;"></div>';
    html += '<div class="color-pick-row" id="new-kid-colors" style="margin-top:9px;">';
    KID_COLORS.forEach(function(c, idx){
      html += '<button type="button" class="color-pick-dot'+(idx===0?" active":"")+'" data-color="'+c.key+'" style="background:'+c.hex+'"></button>';
    });
    html += '</div>';
    html += '<button class="primary-btn" id="add-kid-btn" style="margin-top:11px;width:100%;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ajouter</button>';
    html += '</div>';

    html += '</div>';
    html += '<div class="modal-footer"><span></span><button class="secondary-btn" id="mem-done">Fermer</button></div>';
    html += '</div></div>';

    root.innerHTML = html;

    var selectedColor = KID_COLORS[0].key;

    document.getElementById("mem-close").addEventListener("click", closeMembersModal);
    document.getElementById("mem-done").addEventListener("click", closeMembersModal);
    document.getElementById("mem-overlay").addEventListener("click", function(e){ if(e.target.id==="mem-overlay") closeMembersModal(); });

    root.querySelectorAll("[data-remove]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var id = btn.getAttribute("data-remove");
        openConfirmDialog("Supprimer cet enfant ? Les rendez-vous associés resteront mais ne lui seront plus liés.", function(){
          state.members = state.members.filter(function(m){ return m.id!==id; });
          state.events = state.events.map(function(e){
            return Object.assign({}, e, { memberIds: e.memberIds.filter(function(mid){ return mid!==id; }) });
          });
          saveState();
          renderMembersModal();
          renderAll();
        });
      });
    });

    root.querySelectorAll("#new-kid-colors .color-pick-dot").forEach(function(btn){
      btn.addEventListener("click", function(){
        selectedColor = btn.getAttribute("data-color");
        root.querySelectorAll("#new-kid-colors .color-pick-dot").forEach(function(b){ b.classList.remove("active"); });
        btn.classList.add("active");
      });
    });

    function addKid(){
      var input = document.getElementById("new-kid-name");
      var name = input.value.trim();
      if(!name) return;
      state.members.push({ id: uid(), name: name, color: selectedColor });
      saveState();
      renderMembersModal();
      renderAll();
    }
    document.getElementById("add-kid-btn").addEventListener("click", addKid);
    document.getElementById("new-kid-name").addEventListener("keydown", function(e){
      if(e.key==="Enter") addKid();
    });
  }

  function closeMembersModal(){
    document.getElementById("modal-root").innerHTML = "";
  }

  // ---------- Top-level listeners ----------
  document.getElementById("btn-members").addEventListener("click", openMembersModal);

  // ---------- Lock screen listeners ----------
  function attemptLogin(){
    var input = document.getElementById("lock-code-input");
    var code = input.value.trim();
    document.getElementById("lock-error").textContent = "";
    if(!code){
      showLockError("Merci d'entrer un code d'accès.");
      return;
    }
    setLockSyncStatus("Connexion au serveur...");
    initFirebaseAndConnect(code);
  }
  document.getElementById("lock-submit").addEventListener("click", attemptLogin);
  document.getElementById("lock-code-input").addEventListener("keydown", function(e){
    if(e.key==="Enter") attemptLogin();
  });

  // ---------- Init ----------
  (function init(){
    if(typeof firebase === "undefined"){
      setLockSyncStatus("");
      showLockError("Le service de synchronisation n'a pas pu se charger. Vérifie ta connexion internet.");
      return;
    }
    var remembered = null;
    try{ remembered = localStorage.getItem(LOCAL_CODE_KEY); }catch(e){}
    if(remembered){
      setLockSyncStatus("Reconnexion...");
      initFirebaseAndConnect(remembered);
    } else {
      setLockSyncStatus("");
    }
  })();
})();
</script>
</body>
</html>
